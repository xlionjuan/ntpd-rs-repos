name: Create Repo for ntpd-rs latest

on:
  schedule:
    # Runs at 20:00, on day 17 of the month
    - cron: "0 20 17 * *"
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch:

env:
    REPO_NAME: xlion-ntpd-rs-apt-repo
    CODENAME: main
    COMPONENTS: main
    DISTRIBUTION: main
  
permissions:
  contents: read    

jobs:
    verify:
      name: Verify container
      runs-on: ubuntu-24.04-arm
      steps:
        - name: Install Cosign
          uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

        - name: Verify
          run: |
            cosign verify --rekor-url=https://rekor.sigstore.dev \
            --certificate-identity-regexp "https://github.com/xlionjuan/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ghcr.io/xlionjuan/fedora-createrepo-image:latest

    prepare:
      runs-on: ubuntu-24.04-arm
      needs: verify
      container: ghcr.io/xlionjuan/fedora-createrepo-image:latest
      name: Prepare
      steps:
        - name: Checkout code
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          with:
            persist-credentials: false

        - name: Define workfolder for keyring and ntpd-rs
          run: |
            echo "WORKFOLDER_KEYRING=$(mktemp -p /tmp -d xlion-repo.XXXXX)" >> "$GITHUB_ENV"
            echo "WORKFOLDER_NTPD_RS=$(mktemp -p /tmp -d xlion-repo.XXXXX)" >> "$GITHUB_ENV"

        - name: Bootstrap repo info for xlionjuan/xlion-repo-archive-keyring
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_KEYRING }}
          run: |
            xlion-repo-utils-gh --workfolder $WORKFOLDER --repo xlionjuan/xlion-repo-archive-keyring

        - name: Download keyring
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_KEYRING }}
          run: |
            cd $WORKFOLDER
            cat dl_urls.txt | wget2 --input-file=-
            xlion-repo-utils-gh --verify --workfolder $WORKFOLDER

        - name: Copy keyring to current folder
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_KEYRING }}
          run: |
            cp -r $WORKFOLDER/*.deb .

        - name: Verify Keyring
          shell: bash
          env:
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: |
            gh attestation verify --owner xlionjuan --predicate-type 'https://in-toto.io/attestation/release' xlion-repo-archive-keyring*

        - name: Bootstrap repo info for pendulum-project/ntpd-rs
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_NTPD_RS }}
          run: |
            xlion-repo-utils-gh --workfolder $WORKFOLDER --repo pendulum-project/ntpd-rs

        - name: Download ntpd-rs
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_NTPD_RS }}
          run: |
            cd $WORKFOLDER
            cat dl_urls.txt | grep -E '\.deb$|\.rpm$' | wget2 --input-file=-
            xlion-repo-utils-gh --verify --workfolder $WORKFOLDER

        - name: Copy ntpd-rs packages to current folder
          env:
            WORKFOLDER: ${{ env.WORKFOLDER_NTPD_RS }}
          run: |
            cp -r $WORKFOLDER/*.deb .
            cp -r $WORKFOLDER/*.rpm .

        - name: Move .rpm to rpm folder
          run: |
            mkdir -p wwwroot/rpm
            mv *.rpm wwwroot/rpm

        - name: Initialize apt repository
          run: |
            aptly repo create \
              -component=${{ env.COMPONENTS }} \
              -distribution=${{ env.DISTRIBUTION }} \
              repo-target

        - name: Add .deb to apt repository
          run: |
            aptly repo add repo-target .

        - name: Copy wwwroot to aptly public folder
          run: |
            mkdir -p  $HOME/.aptly/public
            cp -r wwwroot/* $HOME/.aptly/public

        - name: Output summary
          run: |
            echo "## Aptly repo summary" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            aptly repo show -with-packages repo-target >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"

        - name: Publish aptly workspace (Including unprocessed RPMs)
          uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
          with:
            name: aptly-workspace
            path: ~/.aptly
            if-no-files-found: error
            include-hidden-files: true

    publish:
      name: Publish and sign repository
      runs-on: ubuntu-24.04-arm
      needs: prepare
      container: ghcr.io/xlionjuan/fedora-createrepo-image:latest
      if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
      steps:
        - name: Download aptly workspace
          uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
          with:
            pattern: aptly-workspace
            path: ~/.aptly

        - name: Prepare ephemeral GPG home
          shell: bash
          run: |
            set -euo pipefail
            umask 077
            echo "GNUPGHOME=$(mktemp -d)" >> "$GITHUB_ENV"
            echo "GPG_TTY=" >> "$GITHUB_ENV"

        - name: Import GPG Key
          shell: bash
          run: |
            set -euo pipefail
            umask 077

            IMPORT_FPR="$(
              printf '%s' "$GPG_PRIVATE_KEY" |
              gpg --batch --yes --status-fd=1 --import 2>/dev/null |
              sed 's/\[GNUPG:\]/\n[GNUPG:]/g' |
              awk '/^\[GNUPG:\] IMPORT_OK/ {print $4; exit}'
            )"
            test -n "$IMPORT_FPR"
            
            echo "GPG_FINGERPRINT=$IMPORT_FPR" >> "$GITHUB_ENV"
          env:
            GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

        - name: Sign RPMs
          if: github.event_name != 'pull_request'
          run: rpmsign --addsign --key-id "$GPG_FINGERPRINT" ~/.aptly/public/rpm/*.rpm

        - name: Create rpm repository
          run: createrepo_c ~/.aptly/public/rpm

        - name: Sign rpm repository
          if: github.event_name != 'pull_request'
          run: gpg --detach-sign --armor ~/.aptly/public/rpm/repodata/repomd.xml

        - name: Publish apt repository
          run: |
            aptly publish repo \
              -distribution=${{ env.DISTRIBUTION }} \
              -component=${{ env.COMPONENTS }} \
              -label=${{ env.REPO_NAME }} \
              -suite=${{ env.REPO_NAME }} \
              -origin=${{ env.REPO_NAME }} \
              -gpg-key=${{ env.GPG_FINGERPRINT }} \
              repo-target

        - name: Clean up
          if: always()
          run: |
            rm -rf "$GNUPGHOME" || true

        - name: Ensure publish path has no '.'
          run: |
            mkdir -p /tmp/public
            cp -r ~/.aptly/public/* /tmp/public
            mv /tmp/public/{dists,pool} /tmp/public/apt

        - name: Output summary
          run: |
            echo "## Final published folder structure" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tree /tmp/public >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"

        - name: Upload Pages artifact
          uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
          with:
            name: github-pages
            path: /tmp/public

    deploy:
      name: Deploy to GitHub Pages
      if: github.event_name != 'pull_request'
      runs-on: ubuntu-24.04-arm
      permissions:
        contents: read
        pages: write
        id-token: write
      needs: publish
      steps:
        - name: Deploy to GitHub Pages
          uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5